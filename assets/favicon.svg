<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">AAA favicon</title>
  <desc id="desc">A triple A monogram for Abdel Rahman Alashel.</desc>
  <defs>
    <linearGradient id="bg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f2530"/>
      <stop offset="1" stop-color="#071318"/>
    </linearGradient>
    <linearGradient id="ring" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8b26e"/>
      <stop offset="1" stop-color="#7bd0c3"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#bg)"/>
  <rect x="4.75" y="4.75" width="54.5" height="54.5" rx="17.25" fill="none" stroke="url(#ring)" stroke-width="1.5"/>

  <g fill="none" stroke="#f6efe4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <g stroke-width="2.8" transform="translate(11.5 16.5)">
      <path d="M0 30 L6 -1 L12 30"/>
      <path d="M3 18 H9"/>
    </g>
    <g stroke-width="3.2" transform="translate(26 13.5)">
      <path d="M0 33 L7 -1 L14 33"/>
      <path d="M3.5 19.5 H10.5"/>
    </g>
    <g stroke-width="2.8" transform="translate(40.5 16.5)">
      <path d="M0 30 L6 -1 L12 30"/>
      <path d="M3 18 H9"/>
    </g>
  </g>
</svg>
